# ============================================
# STAMPLY — Configuration Render (Backend)
# ============================================
# Render remplace Railway pour le backend Node.js
# Fichier : render.yaml (à placer à la racine du repo)

services:
  - type: web
    name: stamply-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false  # À remplir dans le dashboard Render
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # À remplir dans le dashboard Render
      - key: JWT_SECRET
        sync: false  # À remplir dans le dashboard Render
      - key: STRIPE_SECRET_KEY
        sync: false  # À remplir dans le dashboard Render
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false  # À remplir dans le dashboard Render
      - key: STRIPE_PRICE_ID
        sync: false  # À remplir dans le dashboard Render
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # À remplir dans le dashboard Render
      - key: FRONTEND_URL
        sync: false  # URL du frontend Vercel
      - key: BACKEND_URL
        sync: false  # URL du backend Render (auto-générée)
      - key: GOOGLE_WALLET_KEY_FILE
        value: "./config/google-wallet-key.json"
      - key: STRIPE_PRICE_ID
        sync: false  # À remplir dans le dashboard Render
